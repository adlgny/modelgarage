<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Model Garage</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #000;
    color: white;
}

/* HERO */
.hero {
    height: 100vh;
    background: url('https://images.unsplash.com/photo-1503376780353-7e6692767b70') center/cover;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

.hero h1 {
    font-size: 48px;
}

.hero p {
    opacity: 0.7;
}

/* CATEGORY */
.section {
    padding: 40px 20px;
}

.categories {
    display: grid;
    gap: 20px;
}

.category {
    height: 200px;
    border-radius: 20px;
    display: flex;
    align-items: end;
    padding: 20px;
    background-size: cover;
    background-position: center;
    transition: 0.3s;
}

.category:hover {
    transform: scale(1.03);
}

.category h2 {
    background: rgba(0,0,0,0.6);
    padding: 8px 12px;
    border-radius: 10px;
}

/* STORY */
.story {
    padding: 40px 20px;
    text-align: center;
    opacity: 0.7;
}

/* BUTTON */
button {
    margin-top: 10px;
    padding: 12px 20px;
    border-radius: 30px;
    border: none;
    background: white;
    color: black;
}

/* WHATSAPP */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: white;
    color: black;
    padding: 12px 15px;
    border-radius: 30px;
}

/* DESKTOP */
@media(min-width:768px){
.categories {
    grid-template-columns: repeat(3,1fr);
}
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
<h1>Model Garage</h1>
<p>Her modelin bir hikayesi vardır.</p>
</section>

<!-- CATEGORIES -->
<section class="section">

<div class="categories">

<div class="category" style="background-image:url('https://images.unsplash.com/photo-1511919884226-fd3cad34687c')">
<div>
<h2>Die-Cast Cars</h2>
<button onclick="ask('Die-Cast Cars')">Ayrıntılı Bilgi Al</button>
</div>
</div>

<div class="category" style="background-image:url('https://images.unsplash.com/photo-1606813907291-d86efa9b94db')">
<div>
<h2>Lego</h2>
<button onclick="ask('Lego')">Ayrıntılı Bilgi Al</button>
</div>
</div>

<div class="category" style="background-image:url('https://images.unsplash.com/photo-1605559424843-9e4c228bf1c2')">
<div>
<h2>RC Cars</h2>
<button onclick="ask('RC Cars')">Ayrıntılı Bilgi Al</button>
</div>
</div>

</div>

</section>

<!-- STORY -->
<section class="story">
Model Garage, otomobil tutkusunu minyatür dünyada yaşatan özel bir koleksiyondur.
</section>

<div class="whatsapp" onclick="ask('Genel bilgi')">
Danışmanlık Al
</div>

<script>
function ask(model) {

let part1 = "90543";
let part2 = "6060906";
let phone = part1 + part2;

let message = model + " hakkında bilgi almak istiyorum.";
let url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(message);

window.open(url, "_blank");
}
</script>

</body>
</html>
